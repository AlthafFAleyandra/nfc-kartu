<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hallow Sayangku</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ===== HALAMAN 1: PERTANYAAN ===== */
  #page-question {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffdde1 0%, #ffc3a0 100%);
    position: relative;
    padding: 20px;
    text-align: center;
  }

  #page-question h1 {
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    color: #7a2e3d;
    margin-bottom: 40px;
    text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
    position: relative;
    z-index: 10;
  }

  .btn {
    padding: 14px 32px;
    font-size: 1.1rem;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    transition: transform 0.15s ease;
    position: relative;
    z-index: 20;
  }

  .btn:active {
    transform: scale(0.95);
  }

  #btn-yes {
    background: #ff6b81;
    color: white;
  }
  #btn-yes:hover {
    background: #ff4d67;
  }

  #btn-no {
    background: #ffffff;
    color: #7a2e3d;
    position: relative;
  }
  #btn-no:hover {
    background: #f5f5f5;
  }

  #btn-no.roaming {
    position: fixed;
    z-index: 999;
  }

  .btn-group {
    display: flex;
    gap: 20px;
  }

  /* ===== HALAMAN 2: TAMAN ===== */
  #page-garden {
    display: none;
    min-height: 100vh;
    position: relative;
    background: linear-gradient(to bottom, #a1e3ff 0%, #cdf5e0 60%, #8fd694 100%);
    overflow: hidden;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  #page-garden.active {
    display: flex;
  }

  .sun {
    position: absolute;
    top: 40px;
    right: 60px;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, #fff6b7 0%, #ffd93d 70%);
    border-radius: 50%;
    box-shadow: 0 0 40px 10px rgba(255, 217, 61, 0.6);
  }

  .cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.9;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud1 { width: 100px; height: 35px; top: 60px; left: 10%; }
  .cloud1::before { width: 50px; height: 50px; top: -20px; left: 10px; }
  .cloud1::after { width: 60px; height: 40px; top: -15px; left: 45px; }

  .cloud2 { width: 80px; height: 28px; top: 120px; right: 20%; }
  .cloud2::before { width: 40px; height: 40px; top: -15px; left: 10px; }
  .cloud2::after { width: 45px; height: 32px; top: -12px; left: 35px; }

  .hill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 180px;
    background: #7bc96f;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }
  .hill2 {
    height: 130px;
    background: #6bb95f;
    opacity: 0.8;
  }

  .flower {
    position: absolute;
    bottom: 20px;
    font-size: 2rem;
    animation: sway 3s ease-in-out infinite;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }

  .butterfly {
    position: absolute;
    font-size: 1.5rem;
    animation: flutter 6s ease-in-out infinite;
  }
  @keyframes flutter {
    0% { transform: translate(0, 0); }
    25% { transform: translate(30px, -20px); }
    50% { transform: translate(60px, 10px); }
    75% { transform: translate(30px, -10px); }
    100% { transform: translate(0, 0); }
  }

  .message-box {
    position: relative;
    z-index: 10;
    background: rgba(255, 255, 255, 0.85);
    padding: 30px 40px;
    border-radius: 20px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    text-align: center;
  }

  .message-box h1 {
    font-size: clamp(1.8rem, 6vw, 3rem);
    color: #d6336c;
    margin-bottom: 10px;
  }

  .message-box p {
    color: #555;
    font-size: 1rem;
  }

  .heart {
    position: absolute;
    color: #ff6b81;
    font-size: 1.5rem;
    animation: floatUp 4s ease-in infinite;
    opacity: 0;
    z-index: 5;
    pointer-events: none;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) scale(0.8); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-400px) scale(1.2); opacity: 0; }
  }
  .corner-label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-size: 1.2rem;
    font-weight: bold;
    color: #7a2e3d;
    font-family: 'Segoe UI', cursive;
    z-index: 30;
    text-shadow: 1px 1px 2px rgba(255,255,255,0.6);
  }
</style>
</head>
<body>

  <!-- HALAMAN 1 -->
  <div id="page-question">
    <div class="corner-label">Dear Nadhifah ❤️</div>
    <h1>Hallow sayangku, kamu sayang aku gak? 🥺</h1>
    <div class="btn-group">
      <button class="btn" id="btn-yes">Iya</button>
      <button class="btn" id="btn-no">Tidak</button>
    </div>
  </div>

  <!-- HALAMAN 2 -->
  <div id="page-garden">
    <div class="sun"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="hill hill2" style="opacity:0.6;"></div>
    <div class="hill"></div>

    <div class="message-box">
      <h1>HEHE :D</h1>
      <p>aku lebih sayang kamu hanii, kamu sehat-sehat yaa sayangkuu... semoga apa yang kamu inginkan tercapai maniss<br><br>4 jempol untuk kamu [Sampe jempol kaki untuk kamu juga]</p>
    </div>
  </div>

<script>
  const btnYes = document.getElementById('btn-yes');
  const btnNo = document.getElementById('btn-no');
  const pageQuestion = document.getElementById('page-question');
  const pageGarden = document.getElementById('page-garden');

  // Kunci posisi awal kedua tombol jadi 'fixed' sejak awal,
  // supaya saat tombol "Tidak" pindah, tombol "Iya" TIDAK ikut ter-reflow/ke-tengah.
  function lockInitialPositions() {
    // Ukur posisi KEDUA tombol dulu (selagi masih di layout flex normal),
    // baru terapkan 'fixed' setelahnya — supaya tidak saling geser saat diukur.
    const rectYes = btnYes.getBoundingClientRect();
    const rectNo = btnNo.getBoundingClientRect();

    btnYes.style.position = 'fixed';
    btnYes.style.left = rectYes.left + 'px';
    btnYes.style.top = rectYes.top + 'px';
    btnYes.style.margin = '0';

    btnNo.style.position = 'fixed';
    btnNo.style.left = rectNo.left + 'px';
    btnNo.style.top = rectNo.top + 'px';
    btnNo.style.margin = '0';
  }
  lockInitialPositions();
  // Jaga-jaga kalau ukuran layar berubah (resize/orientasi), posisi awal disesuaikan ulang
  // hanya sebelum tombol "Tidak" pernah dipindah.
  let noHasMoved = false;
  window.addEventListener('resize', () => {
    if (!noHasMoved) lockInitialPositions();
  });

  // Fungsi generik: hati yang berterbangan/melayang naik di dalam sebuah container
  function spawnHearts(container, options = {}) {
    const {
      intervalMs = 400,   // makin kecil = makin sering muncul
      heartsPerTick = 3,  // jumlah hati tiap kali muncul
      icons = ['💗', '❤️', '💕', '💖']
    } = options;

    setInterval(() => {
      // Hentikan kalau container sudah tidak terlihat (misal pindah halaman)
      if (container.offsetParent === null) return;

      for (let i = 0; i < heartsPerTick; i++) {
        const h = document.createElement('div');
        h.className = 'heart';
        h.textContent = icons[Math.floor(Math.random() * icons.length)];
        h.style.left = (Math.random() * 92) + '%';
        h.style.bottom = '0px';
        h.style.fontSize = (1.2 + Math.random() * 1.3) + 'rem';
        h.style.animationDuration = (3 + Math.random() * 2) + 's';
        container.appendChild(h);
        setTimeout(() => h.remove(), 5500);
      }
    }, intervalMs);
  }

  // Hati berterbangan di halaman pertanyaan (mulai langsung saat halaman dibuka)
  spawnHearts(pageQuestion, { intervalMs: 350, heartsPerTick: 2 });

  // Tombol IYA -> pindah ke halaman taman
  btnYes.addEventListener('click', () => {
    pageQuestion.style.display = 'none';
    pageGarden.classList.add('active');
    spawnDecor();
  });

  // Tombol TIDAK -> pindah ke posisi random tiap diklik
  function moveButtonRandomly() {
    const btnWidth = btnNo.offsetWidth;
    const btnHeight = btnNo.offsetHeight;
    const maxX = window.innerWidth - btnWidth - 20;
    const maxY = window.innerHeight - btnHeight - 20;

    const randomX = Math.max(10, Math.random() * maxX);
    const randomY = Math.max(10, Math.random() * maxY);

    btnNo.style.left = randomX + 'px';
    btnNo.style.top = randomY + 'px';
    noHasMoved = true;
  }

  btnNo.addEventListener('click', (e) => {
    e.preventDefault();
    moveButtonRandomly();
  });

  // Tombol juga kabur saat kursor MENDEKAT (proximity), tidak perlu benar-benar hover di atasnya.
  const PROXIMITY_THRESHOLD = 80; // jarak dalam px, semakin besar semakin "sensitif"

  document.addEventListener('mousemove', (e) => {
    // Jangan aktif kalau sudah pindah ke halaman taman
    if (pageGarden.classList.contains('active')) return;

    const rect = btnNo.getBoundingClientRect();
    const btnCenterX = rect.left + rect.width / 2;
    const btnCenterY = rect.top + rect.height / 2;

    const distance = Math.hypot(e.clientX - btnCenterX, e.clientY - btnCenterY);

    if (distance < PROXIMITY_THRESHOLD) {
      moveButtonRandomly();
    }
  });

  // Dekorasi tambahan di halaman taman: bunga, kupu-kupu, hati melayang
  function spawnDecor() {
    const flowers = ['🌸', '🌷', '🌼', '🌻'];
    for (let i = 0; i < 8; i++) {
      const f = document.createElement('div');
      f.className = 'flower';
      f.textContent = flowers[Math.floor(Math.random() * flowers.length)];
      f.style.left = (Math.random() * 90) + '%';
      f.style.animationDelay = (Math.random() * 2) + 's';
      pageGarden.appendChild(f);
    }

    for (let i = 0; i < 2; i++) {
      const b = document.createElement('div');
      b.className = 'butterfly';
      b.textContent = '🦋';
      b.style.left = (10 + Math.random() * 70) + '%';
      b.style.top = (30 + Math.random() * 30) + '%';
      b.style.animationDelay = (Math.random() * 2) + 's';
      pageGarden.appendChild(b);
    }

    // Hati berterbangan lebih banyak di halaman taman
    spawnHearts(pageGarden, { intervalMs: 300, heartsPerTick: 3 });
  }
</script>

</body>
</html>
